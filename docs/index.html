<meta charset="UTF-8">

<style>
:root{--bg:#f8f9fb;--surface:#fff;--surface2:#f1f3f5;--border:#e2e8f0;--dark:#0f172a;--muted:#64748b;--accent:#1e40af;--accent-light:#eff6ff;--green:#16a34a;--green-light:#f0fdf4;--amber:#d97706;--amber-light:#fffbeb;--red:#dc2626;--red-light:#fef2f2;--purple:#7c3aed;--purple-light:#f5f3ff;--teal:#0f766e;--teal-light:#f0fdfa;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--aws:#FF9900;--azure:#0078D4;--gcp:#4285F4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--dark)}
.header{background:var(--dark);padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{color:#fff;font-size:18px;font-weight:600;letter-spacing:-.3px}
.header .sub{color:#94a3b8;font-size:13px;margin-top:2px}
.header .badge{background:var(--accent);color:#fff;font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600;letter-spacing:.5px}
.layout{display:flex;min-height:calc(100vh - 64px)}
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;position:sticky;top:0;align-self:flex-start;max-height:100vh}
.nav-group{margin-bottom:8px}
.nav-group-label{font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:700;padding:8px 20px 6px;display:block}
.nav-item{padding:7px 20px 7px 28px;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .12s;border-left:2px solid transparent;display:block}
.nav-item:hover{background:var(--surface2);color:var(--dark)}
.nav-item.active{background:var(--accent-light);color:var(--accent);border-left-color:var(--accent);font-weight:600}
.content{flex:1;max-width:1100px;margin:0 auto;padding:24px;min-width:0}
.acc-toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:8px}
.acc-toolbar button{font-family:var(--font);font-size:11px;font-weight:500;padding:5px 10px;background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:5px;cursor:pointer;transition:all .12s}
.acc-toolbar button:hover{background:var(--surface2);color:var(--dark);border-color:var(--accent)}
.acc{margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.acc-head{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;user-select:none;transition:background .12s}
.acc-head:hover{background:var(--surface2)}
.acc-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--accent-light);color:var(--accent);font-weight:600;font-size:12px;flex-shrink:0}
.acc-title{flex:1;font-size:14px;font-weight:600;color:var(--dark)}
.acc-sub{font-size:11px;color:var(--muted);font-weight:400;margin-left:auto;margin-right:8px}
.acc-chev{flex-shrink:0;color:var(--muted);font-size:12px;transition:transform .15s;transform:rotate(0deg)}
.acc.open .acc-chev{transform:rotate(90deg)}
.acc-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.acc.open .acc-body{display:block;padding-top:16px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px;border-left:3px solid var(--accent)}
.dash-card .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.dash-card .val{font-size:24px;font-weight:600;margin:4px 0}
.dash-card .sub{font-size:11px;color:var(--muted)}
@media(max-width:900px){.layout{flex-direction:column}.sidebar{width:100%;position:static;max-height:none;border-right:0;border-bottom:1px solid var(--border)}.nav-group{display:inline-block;vertical-align:top;margin:0 8px 8px 0}}
.sl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;margin:24px 0 10px}
.sl:first-child{margin-top:0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card h3{font-size:14px;font-weight:600;margin-bottom:8px}
.mono{font-family:var(--mono)}
.code{font-family:var(--mono);font-size:11px;background:var(--dark);color:#e2e8f0;padding:14px 16px;border-radius:8px;line-height:1.7;overflow-x:auto;white-space:pre;margin:8px 0}
.ck{color:#93c5fd}.cs{color:#86efac}.cn{color:#fcd34d}.cc{color:#64748b}.ce{color:#fca5a5}
.badge-sm{display:inline-block;font-size:9px;font-weight:600;padding:2px 8px;border-radius:10px}
.b-aws{background:var(--aws);color:#fff}.b-azure{background:var(--azure);color:#fff}.b-gcp{background:var(--gcp);color:#fff}
.b-ok{background:var(--green-light);color:var(--green)}.b-warn{background:var(--amber-light);color:var(--amber)}
.b-err{background:var(--red-light);color:var(--red)}.b-info{background:var(--accent-light);color:var(--accent)}
.b-purple{background:var(--purple-light);color:var(--purple)}.b-teal{background:var(--teal-light);color:var(--teal)}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.tbl th{text-align:left;padding:8px 10px;font-weight:600;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--surface2)}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.tbl tr:hover td{background:var(--surface2)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px}
.metric .label{font-size:11px;color:var(--muted)}
.metric .val{font-size:22px;font-weight:600;margin-top:2px}
.metric .sub{font-size:11px;color:var(--muted);margin-top:2px}
.flow-step{display:grid;grid-template-columns:44px 1fr 240px;gap:0;margin-bottom:0}
.flow-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;margin-top:2px}
.flow-line-area{display:flex;flex-direction:column;align-items:center}
.flow-connector{width:2px;flex:1;background:var(--border);margin-top:4px}
.flow-body{padding-bottom:20px}
.flow-title{font-size:13px;font-weight:600;margin-bottom:3px}
.flow-desc{font-size:12px;color:var(--muted);line-height:1.6}
.flow-side{font-size:11px;color:var(--muted);line-height:1.5;padding:4px 12px;border-left:2px solid var(--border);margin-top:2px}
.flow-side strong{color:var(--dark);font-weight:500}
.resolve-chain{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:8px 0}
.resolve-node{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--surface)}
.resolve-arrow{color:var(--muted);font-size:13px}
.alert{border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.6;margin:8px 0}
.alert-ok{background:var(--green-light);border:1px solid #bbf7d0;color:#166534}
.alert-err{background:var(--red-light);border:1px solid #fecaca;color:#991b1b}
.alert-warn{background:var(--amber-light);border:1px solid #fde68a;color:#92400e}
.alert-info{background:var(--accent-light);border:1px solid #bfdbfe;color:#1e3a8a}
.demo-row{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin:12px 0}
.demo-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.demo-field select,.demo-field input{font-family:var(--font);font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface)}
.btn{font-family:var(--font);font-size:12px;font-weight:600;padding:8px 18px;border-radius:6px;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#1e3a8a}
.btn-outline{background:var(--surface);color:var(--dark);border:1px solid var(--border)}.btn-outline:hover{background:var(--surface2)}
.arch-container{position:relative;margin:16px 0}
.cb-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.cb-row:last-child{border:none}
.cb-bar-wrap{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin:0 12px}
.cb-bar{height:100%;border-radius:4px}
.approval-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--surface)}
@media(max-width:768px){.flow-step{grid-template-columns:44px 1fr}.flow-side{display:none}.metrics{grid-template-columns:1fr 1fr}}
</style>
</head>

function render(){
  const navHTML = NAV.map(g => `
    <div class="nav-group">
      <span class="nav-group-label">${g.group}</span>
      ${g.items.map(it => `<div class="nav-item ${it.id===currentTab?'active':''}" onclick="navigate('${it.id}')">${it.label}</div>`).join('')}
    </div>
  `).join('') + `
    <div style="padding:14px 18px 12px;margin-top:8px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);line-height:1.5">
      <div style="font-family:var(--mono);font-weight:600;color:var(--accent);cursor:pointer" onclick="navigate('changelog')" title="View changelog">v${BUILD.version}</div>
      <div style="margin-top:2px">${BUILD.date} \u00b7 ${BUILD.commits} commits</div>
    </div>
  `;
  document.getElementById('nav').innerHTML = navHTML;
  const item = NAV.flatMap(g=>g.items).find(i=>i.id===currentTab) || NAV[0].items[0];
  const fn = window[item.fn];
  document.getElementById('content').innerHTML = typeof fn === 'function' ? fn() : '<p>Tab not found.</p>';
  document.getElementById('content').scrollTop = 0;
  window.scrollTo(0, 0);
}
function navigate(id){
  currentTab = id;
  try {
    if (history.replaceState && location.protocol !== 'about:') {
      history.replaceState(null, '', '#' + id);
    }
  } catch(e) { /* sandboxed iframe: silent no-op */ }
  render();
}
window.addEventListener('hashchange', () => {
  const h = location.hash.replace('#','');
  if (h && NAV.flatMap(g=>g.items).find(i=>i.id===h)) { currentTab = h; render(); }
});
// On load, honor URL hash
(function(){

})();

// Accordion helpers — first item open by default, rest collapsed
function accGroup(id, items){
  const toolbar = `<div class="acc-toolbar">
    <button onclick="accSet('${id}', true)">Expand all</button>
    <button onclick="accSet('${id}', false)">Collapse all</button>
  </div>`;
  const body = items.map((it, i) => `
    <div class="acc" data-acc="${id}">
      <div class="acc-head" onclick="accToggle(this)">
        <span class="acc-num">${i+1}</span>
        <span class="acc-title">${it.title}</span>
        ${it.sub ? `<span class="acc-sub">${it.sub}</span>` : ''}
        <span class="acc-chev">\u25b6</span>
      </div>
      <div class="acc-body">${it.body}</div>
    </div>
  `).join('');
  return toolbar + body;
}
function accToggle(head){
  const card = head.parentElement;
  card.classList.toggle('open');
}
function accSet(groupId, open){
  document.querySelectorAll('[data-acc="' + groupId + '"]').forEach(c => {
    if (open) c.classList.add('open'); else c.classList.remove('open');
  });
}

  {title:'PNI \u2014 Private Network Interface', sub:'AWS only \u00b7 Feb 2025 GA', body:'<p style="font-size:13px;color:var(--muted);line-height:1.7">ENI in customer VPC. Available for Enterprise + Freight clusters. <strong style="color:var(--dark)">Cheapest option \u2014 ~50% lower than PrivateLink.</strong> Customer security groups control inbound. The "right answer at scale" but customers ask for PrivateLink first because that\'s what they know.</p>'},
  {title:'PrivateLink / Private Service Connect', sub:'AWS \u00b7 Azure \u00b7 GCP', body:'<p style="font-size:13px;color:var(--muted);line-height:1.7">Service-level, unidirectional. Best isolation. Most expensive of the private options. The default ask in most enterprise procurement RFPs because it\'s recognized as the gold-standard isolation model. <strong style="color:var(--dark)">PLATT \u2192 PrivateLink Gateway transition shipped Feb 13, 2026</strong> \u2014 customers on the legacy attachment surface have to migrate, and that migration is a real PM problem (Terraform state, DNS, downtime windows).</p>'},
  {title:'VPC / VNet Peering', sub:'AWS \u00b7 Azure \u00b7 GCP', body:'<p style="font-size:13px;color:var(--muted);line-height:1.7">Bidirectional. Same region only. Requires non-overlapping CIDRs (/16). Non-transitive (peer-of-peer doesn\'t reach). The legacy connectivity option \u2014 still common because it\'s the easiest to reason about, but the CIDR coordination problem makes it the worst at scale.</p>'},
  {title:'Transit Gateway', sub:'AWS only', body:'<p style="font-size:13px;color:var(--muted);line-height:1.7">Hub-and-spoke. Multi-VPC transitive. RAM-shared from customer to Confluent\'s AWS account (050879227952). The "I have 30 VPCs" answer.</p>'},
  {title:'Public internet endpoint', sub:'Basic / Standard tiers', body:'<p style="font-size:13px;color:var(--muted);line-height:1.7">TLS 1.2+ \u00b7 API key / OAuth / mTLS. Proxy-protected (DDoS / SYN flood). Available only for Basic and Standard cluster tiers. Most enterprises don\'t use this in prod, but it\'s the on-ramp for trial and dev environments.</p>'},
  {title:'WarpStream BYOC \u2014 the zero-access option', sub:'NEW \u00b7 acquired Sept 2024', body:'<p style="font-size:13px;color:var(--muted);line-height:1.7">Data plane lives in <strong style="color:var(--dark)">customer\'s own S3 / GCS / Azure Blob</strong>. Confluent control plane never accesses raw data. Zero-access architecture for regulated industries (banking, healthcare, defense) where "Confluent has access to our bytes" is a procurement blocker. Different threat model than PrivateLink \u2014 PrivateLink protects the wire, BYOC removes Confluent from the data path entirely.</p>'},
])}

<div class="sl">A Flink example \u2014 fraud detection in 30 lines</div>
<div class="card"><p style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:12px">To make this concrete: here is a real Flink SQL job that detects credit-card fraud in real time. It reads from a Kafka topic of card transactions, maintains state per card, joins against a customer-profile table, applies a windowed rule, and writes alerts back to Kafka. This is a load-bearing example of what "stream processing" actually means.</p>
<div class="card" style="margin:0;padding:14px;background:#1e293b;border:1px solid #334155;font-family:var(--mono);font-size:11px;line-height:1.6;color:#e2e8f0;overflow-x:auto"><pre style="margin:0;color:#e2e8f0">-- 1. Define the source: Kafka topic of transactions
CREATE TABLE transactions (
  card_id        STRING,
  amount         DECIMAL(10,2),
  country        STRING,
  merchant       STRING,
  txn_time       TIMESTAMP(3),
  WATERMARK FOR txn_time AS txn_time - INTERVAL \'5\' SECOND
) WITH (
  \'connector\' = \'kafka\',
  \'topic\'     = \'payments.transactions\',
  \'format\'    = \'avro-confluent\'
);

-- 2. Define the sink: another Kafka topic for alerts
CREATE TABLE fraud_alerts (
  card_id    STRING,
  alert_type STRING,
  countries  ARRAY&lt;STRING&gt;,
  window_end TIMESTAMP(3)
) WITH (
  \'connector\' = \'kafka\',
  \'topic\'     = \'fraud.alerts\',
  \'format\'    = \'avro-confluent\'
);

-- 3. The actual detection: card used in 2+ countries within 5 minutes
INSERT INTO fraud_alerts
SELECT
  card_id,
  \'IMPOSSIBLE_TRAVEL\' AS alert_type,
  ARRAY_AGG(DISTINCT country) AS countries,
  TUMBLE_END(txn_time, INTERVAL \'5\' MINUTE) AS window_end
FROM transactions
GROUP BY
  card_id,
  TUMBLE(txn_time, INTERVAL \'5\' MINUTE)
HAVING COUNT(DISTINCT country) &gt; 1;</pre></div>
<p style="font-size:12px;color:var(--muted);margin-top:14px;line-height:1.7"><strong style="color:var(--dark)">What\'s actually happening here:</strong></p>
<ul style="font-size:12px;color:var(--muted);line-height:1.8;margin-top:6px;padding-left:24px">
<li><strong>WATERMARK</strong> tells Flink "events may arrive up to 5 seconds late, but no later." This is what lets the windowed query produce correct results even when events arrive out of order.</li>
<li><strong>TUMBLE(txn_time, INTERVAL \'5\' MINUTE)</strong> creates non-overlapping 5-minute windows based on the event timestamp, not the arrival timestamp. A transaction stamped 14:03:12 belongs in the 14:00\u201314:05 window even if it arrives late.</li>
<li><strong>GROUP BY card_id, TUMBLE(...)</strong> keeps state per card per window. Flink stores this in RocksDB on each worker, replicated for fault tolerance, recoverable on crash.</li>
<li><strong>HAVING COUNT(DISTINCT country) &gt; 1</strong> emits only windows where the card was used in 2+ countries \u2014 the fraud signal.</li>
<li><strong>The whole job</strong> compiles to a distributed dataflow, runs across however many task managers Confluent allocates, processes millions of transactions per second, and emits alerts within seconds of the second country transaction landing.</li>
</ul>
<p style="font-size:12px;color:var(--muted);margin-top:14px;line-height:1.7"><strong style="color:var(--dark)">The point of the example:</strong> none of this is possible with vanilla Kafka consumers. Maintaining keyed state, watermarks, windowing, exactly-once semantics, distributed checkpointing, recovery on failure \u2014 all of it requires a real stream processing engine. Confluent\'s Flink acquisition (Immerok, January 2023) is what makes this a managed-service experience instead of "go run your own Flink cluster on Kubernetes."</p>
</div>

<div class="alert alert-info"><strong>The Snowflake / Databricks question.</strong> Confluent doesn\'t compete with Snowflake or Databricks \u2014 it feeds them. Tableflow materializes Kafka topics directly to Iceberg or Delta Lake files in customer S3, and from there both warehouses read natively (Snowflake via Iceberg Tables, Databricks via Delta). The strategic position is upstream: own the event stream and the bridge to analytics, let the customer pick whichever warehouse they prefer. The actual competition is the CSP-native messaging services (Kinesis, Pub/Sub, Event Hubs) trying to keep customers from leaving the cloud provider for Confluent.</div>

<div class="alert alert-warn"><strong>Confluent \u2260 Cloudflare topology.</strong> Cloudflare\'s edge model works because Cloudflare owns 330+ anycast PoPs that <em>are</em> the middle mile. Confluent is a tenant on AWS/Azure/GCP \u2014 there is no Confluent-owned backbone. The product surface is therefore <strong>configuring CSP primitives cleanly</strong> (PrivateLink, PNI, peering, TGW), not building a global mesh. <strong style="color:var(--dark)">This is exactly the surface Conduit orchestrates.</strong> The same multi-SaaS private connectivity pattern that Confluent customers wire up by hand today is what Conduit automates.</div>

<p style="font-size:12px;color:var(--muted);margin-top:12px;line-height:1.7"><strong style="color:var(--dark)">Reading top to bottom:</strong> Producers feed three resolution planes (identity / posture-or-location / profiling-or-infra). The decision point combines them into a policy outcome. The outcome and its context publish to a pub/sub bus. Subscribers read what they need. Each system is a different layer of the stack, but the architectural shape is identical.</p>

<div class="sl">Component-by-component mapping</div>
<table class="tbl">
<tr><th>Layer</th><th>Cisco ISE / pxGrid</th><th>Conduit</th><th>Hybrid PubSub</th></tr>
<tr><td><strong>What it gates</strong></td><td>Network access</td><td>Cloud-SaaS connectivity</td><td>Property-edge integrations</td></tr>
<tr><td><strong>Identity plane</strong></td><td>AD / LDAP \u2192 user, device</td><td>SSO/IdP \u2192 team, cost center</td><td>SPIFFE/SPIRE \u2192 workload SVID</td></tr>
<tr><td><strong>Second plane</strong></td><td>Posture (AnyConnect)</td><td>Location (service registry)</td><td>Posture (WAL-3 attestation)</td></tr>
<tr><td><strong>Third plane</strong></td><td>Profiling (passive id)</td><td>Infrastructure (Day 0 config)</td><td>Schema (AsyncAPI / CloudEvents)</td></tr>
<tr><td><strong>Decision output</strong></td><td>dACL / VLAN / SGT</td><td>PrivateLink / Peering / TGW / PNI</td><td>Topic ACL / mTLS cert / marketplace install</td></tr>
<tr><td><strong>Bus protocol</strong></td><td>XMPP (pxGrid 1) \u2192 STOMP (pxGrid 2)</td><td>Kafka / Confluent</td><td>NATS JetStream (cloud) + MQTT 5 (edge)</td></tr>
<tr><td><strong>Topic family</strong></td><td>SessionDirectory, TrustSecMetadata, EndpointProfile</td><td>conduit.connections.*, preflight.*, lifecycle.*</td><td>hybrid.access.*, hybrid.pms.*, hybrid.iot.*</td></tr>
<tr><td><strong>Reconciliation</strong></td><td>RADIUS CoA</td><td>preflight cron \u2192 SNOW INC</td><td>NATS leaf reconnect + replay</td></tr>
<tr><td><strong>Subscribers</strong></td><td>Stealthwatch, Firepower, SIEM, partners (40+)</td><td>Billing, CMDB, Datadog, SIEM, customer</td><td>BMx, Hapi, marketplace, operator UI</td></tr>
<tr><td><strong>Audit / replay</strong></td><td>ISE log API + pxGrid history</td><td>90d topic retention + Tableflow \u2192 Iceberg</td><td>NATS retention + JetStream stream replay</td></tr>
<tr><td><strong>What's the moat</strong></td><td>Context graph (not RADIUS)</td><td>Event stream (not provisioning)</td><td>Marketplace + identity (not protocol)</td></tr>
</table>

<div class="sl">What changed between ISE and the modern instances</div>
<table class="tbl">
<tr><th>Dimension</th><th>ISE / pxGrid (2011\u20132014)</th><th>Conduit / Hybrid (2026\u2013)</th></tr>
<tr><td><strong>Bus technology</strong></td><td>XMPP \u2014 chosen because it was a standards-track pub/sub at the time</td><td>Kafka or NATS \u2014 retention, replay, schema registry, native cloud</td></tr>
<tr><td><strong>Identity</strong></td><td>AD / LDAP integration with custom attribute mapping</td><td>SSO/JWT and SPIFFE/SPIRE \u2014 workload identity is first-class</td></tr>
<tr><td><strong>Schema</strong></td><td>Cisco-defined topics; partner integration was a Cisco-engineering project</td><td>Open envelope (CloudEvents, AsyncAPI), self-serve partner onboarding</td></tr>
<tr><td><strong>Subscribers</strong></td><td>Closed Cisco ecosystem early (pxGrid 1); opened with pxGrid 2</td><td>Open from day one \u2014 customer brings their own Datadog/Splunk/etc</td></tr>
<tr><td><strong>Audit warehouse</strong></td><td>Custom ISE log export + ETL to Splunk</td><td>Tableflow \u2192 Iceberg / Delta in customer storage \u2014 free analytical surface</td></tr>
<tr><td><strong>Multi-tenancy</strong></td><td>One ISE deployment per organization</td><td>SSO group as tenant key \u2014 one platform serves every team</td></tr>
</table>

<div class="sl">The cautionary note \u2014 SecureX</div>
<div class="alert alert-warn"><strong>SecureX</strong> was Cisco's attempt to build a higher-order platform on top of ISE / AMP / Stealthwatch context, and it failed because there was no P&L sponsor and the integration model stayed closed. <strong style="color:var(--dark)">The lesson:</strong> the platform value lives in the bus, not in the dashboard. Build the primitives so cleanly that any team can subscribe and build their own view, instead of trying to ship the one true console. Both Conduit and Hybrid PubSub are designed with that lesson baked in \u2014 the dashboards in this portal are subscribers to the same stream the customer's own systems can subscribe to, not a closed UI that customers have to live inside.</div>

<div class="sl">Why this matters</div>
<div class="card" style="border-left:3px solid var(--accent)"><p style="font-size:13px;color:var(--muted);line-height:1.7;margin:0"><strong style="color:var(--dark)">The pattern is the portfolio.</strong> Networking-PM candidates can argue for a feature. Platform PMs see a recurring shape and design for it. Three real systems built on the same architectural primitive \u2014 ISE/pxGrid (proven at scale, 15 years of evidence), Conduit (cloud connectivity, this portal), Hybrid PubSub (property events, six-slide deck) \u2014 is harder to argue with than any single instance, because it makes the case that the pattern itself is the product, not the specific implementation.</p></div>

<td style="font-size:11px">${t.consumers}</td>

</table>

<div class="sl">What customers can subscribe to</div>
<div class="card"><p style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:0">Customer subscriptions are scoped by SSO group on the consumer credential \u2014 a team only sees events about its own connections. Reading the firehose requires a platform-team credential. The same scoping that gates the developer portal gates the event stream, so per-team Datadog or Splunk pipelines stay isolated by default.</p></div>

<table class="tbl">
<tr><th>Subscriber</th><th>Topics consumed</th><th>Use case</th></tr>
<tr><td><strong>Billing / FinOps</strong></td><td class="mono" style="font-size:10px">connections.provisioned \u00b7 connections.deleted \u00b7 metering.usage</td><td>Per-team chargeback, showback dashboards</td></tr>
<tr><td><strong>SNOW CMDB</strong></td><td class="mono" style="font-size:10px">connections.provisioned \u00b7 connections.deleted</td><td>CI lifecycle, change tracking</td></tr>
<tr><td><strong>SIEM / audit</strong></td><td class="mono" style="font-size:10px">connections.approved \u00b7 connections.provisioned</td><td>Compliance audit trail, 90d retention</td></tr>
<tr><td><strong>Datadog / Splunk</strong></td><td class="mono" style="font-size:10px">all topics</td><td>Operational dashboards, alerting</td></tr>
<tr><td><strong>PagerDuty</strong></td><td class="mono" style="font-size:10px">preflight.drift</td><td>On-call wake for IAM/SG drift</td></tr>
<tr><td><strong>Capacity planner</strong></td><td class="mono" style="font-size:10px">connections.requested \u00b7 connections.provisioned</td><td>CCN headroom forecast (90d)</td></tr>
<tr><td><strong>Customer's own DD/Splunk</strong></td><td class="mono" style="font-size:10px">scoped to team's SSO group</td><td>Customer subscribes from their existing pipeline</td></tr>
</table>

<div class="sl">Why this matters</div>
<div class="card" style="border-left:3px solid var(--accent)"><p style="font-size:13px;color:var(--muted);line-height:1.7;margin:0"><strong style="color:var(--dark)">The pxGrid lesson.</strong> Cisco ISE became valuable not when it added more authentication methods, but when pxGrid made the policy decisions consumable as a stream. The cloud-SaaS connectivity surface is at the same inflection: PrivateLink Gateway, Egress PL, and Cluster Linking are three separate observability problems for the customer today. If they all published to a single event family, customers could subscribe with their existing pipelines instead of building three integrations. That's the platform move on top of any individual connectivity feature.</p></div>
`;}

<text x="20" y="306" style="font-family:var(--font);font-size:11px;font-weight:500;fill:#dc2626">Gotcha: AWS only \\u00b7 Enterprise cluster only \\u00b7 customers must accept ENIs landing in their subnets.</text>

    {title: `On-prem via Equinix Fabric`, sub: `the three-hop path`, body: `<div class="card" style="padding:8px;overflow-x:auto">

<text x="20" y="250" style="font-family:var(--font);font-size:11px;fill:#64748b">3. Shared-services VPC \\u2192 Confluent via PrivateLink Gateway (no direct on-prem \\u2192 Confluent path exists)</text>
<text x="20" y="268" style="font-family:var(--font);font-size:11px;font-weight:500;fill:#dc2626">Confluent Platform on-prem can also bridge via Cluster Linking outbound (next diagram).</text>

</div>`},

</svg>

function runResolve(){
  const svc=SERVICES[demoSvc];
  if(!svc){demoResult='<div class="alert alert-err">404 \u2014 service not found in registry.</div>';render();return}
  const deps=svc.deps.filter(d=>d.env===demoEnv);
  if(!deps.length){demoResult=`<div class="alert alert-err">404 \u2014 <strong>${demoSvc}</strong> has no deployment in <strong>${demoEnv}</strong>. Available: ${[...new Set(svc.deps.map(d=>d.env))].join(', ')}</div>`;render();return}
  const team=TEAMS.find(t=>t.name===svc.team);
  const steps = [];

  // Step 1 — SSO identity
  steps.push({
    title: 'SSO identity',
    sub: `${team.name} \u00b7 ${team.cc}`,
    body: `<p style="font-size:12px;line-height:1.6">Caller: <strong>${svc.owner}@acme.com</strong> \u00b7 SSO: <span class="badge-sm b-info">${team.sso}</span> \u00b7 Team: <strong>${team.name}</strong> \u00b7 Cost center: <span class="mono">${team.cc}</span> \u00b7 Approver: ${team.approvers[0]}</p>`
  });

  // Step 2 — service registry resolution
  steps.push({
    title: `Service registry: ${demoSvc} in ${demoEnv}`,
    sub: `${deps.length} deployment${deps.length>1?'s':''}`,
    body: deps.map(d=>`<div class="resolve-chain">
<div class="resolve-node" style="background:var(--accent-light);color:var(--accent)">${demoSvc}</div><span class="resolve-arrow">\u2192</span>
<div class="resolve-node">${d.cluster}</div><span class="resolve-arrow">\u2192</span>
<div class="resolve-node">${cspBadge(d.csp)} ${d.region}</div><span class="resolve-arrow">\u2192</span>
<div class="resolve-node">${d.ns} (${d.rep} replicas)</div>
</div>`).join('')
  });

  // Step 3 — Day 0 config match
  let conns = [];
  let day0Body = '';
  let day0Sub = '';
  let day0Errors = 0;
  deps.forEach(d=>{
    const cfg = findDay0(svc.team, d.env, d.csp, d.region);
    if(!cfg){
      day0Body += `<div class="alert alert-err">422 \u2014 No Day 0 config for ${svc.team}/${d.env}/${d.csp}/${d.region}. Platform team must register.</div>`;
      day0Errors++;
      return;
    }
    const bs = `pkc-${d.env}01.${d.region}.${d.csp}.confluent.cloud:9092`;
    const ep = `${d.csp==='aws'?'vpce':d.csp==='azure'?'pe':'psc'}-${demoSvc.replace('-svc','')}-${d.region.replace(/-/g,'').substring(0,6)}`;
    conns.push({csp:d.csp, region:d.region, bs, ep, vpc:cfg.vpc, iam:cfg.iam, sg:cfg.sg});
    day0Body += `<div class="card"><div style="font-size:12px;line-height:1.7">
${cspBadge(d.csp)} <strong>${d.region}</strong> \u00b7 VPC: <span class="mono">${cfg.vpc}</span> (${cfg.cidr}) \u00b7 Subnets: <span class="mono">${cfg.subnets.join(', ')}</span><br>
IAM: <span class="mono" style="font-size:10px">${cfg.iam}</span> \u00b7 SG: <span class="mono">${cfg.sg}</span></div></div>`;
  });
  day0Sub = day0Errors > 0 ? `${day0Errors} missing` : `${conns.length} match${conns.length>1?'es':''}`;
  steps.push({title:'Day 0 config match', sub:day0Sub, body:day0Body});

  if(conns.length){
    const snow = demoEnv === 'prod';
    // Step 4 — approval
    steps.push({
      title: snow ? 'SNOW approval (prod)' : 'Auto-approved',
      sub: snow ? `RITM \u2192 ${team.approvers[0]}` : 'under threshold',
      body: snow
        ? `<div class="alert alert-warn"><strong>SNOW RITM created</strong> \u2014 ${conns.length} location${conns.length>1?'s':''}. Routed to ${team.approvers[0]}. Projected: $${(conns.length*71.40).toFixed(2)}/mo.</div>`
        : `<div class="alert alert-ok"><strong>Auto-approved</strong> \u2014 dev/QA, under threshold.</div>`
    });

    // Step 5 — developer receives
    steps.push({
      title: 'Developer receives',
      sub: `${conns.length} endpoint${conns.length>1?'s':''} active`,
      body: `<div class="alert alert-ok"><strong>${conns.length>1?conns.length+' multi-cloud endpoints provisioned':'Endpoint provisioned'}</strong></div>
<div class="code"><span class="cc">// response \u2014 paste into code</span>
{
  <span class="cs">"connections"</span>: [${conns.map(c=>`
    { <span class="cs">"bootstrap"</span>: <span class="cs">"${c.bs}"</span>,
      <span class="cs">"endpoint"</span>: <span class="cs">"${c.ep}"</span> }`).join(',')}
  ],
  <span class="cs">"env_vars"</span>: {
    <span class="cs">"KAFKA_BOOTSTRAP_SERVERS"</span>: <span class="cs">"${conns.map(c=>c.bs).join(',')}"</span>,
    <span class="cs">"KAFKA_API_KEY"</span>: <span class="cs">"XXXXXXXX"</span>,
    <span class="cs">"KAFKA_API_SECRET"</span>: <span class="cs">"********"</span>
  }
}</div>`
    });
  }

  demoResult = `<div class="sl">Resolution chain</div>${accGroup('portal-steps', steps)}`;
  render();
}

    perf: <span class="cs">scheduled</span>
    staging: <span class="cs">scheduled</span>
    qa: <span class="cs">serverless</span>
    dev: <span class="cs">serverless</span>
  <span class="ck">serverless</span>:
    wake_on: <span class="cs">dns_query</span>
    idle_timeout_min: <span class="cn">30</span>
    drain_period_min: <span class="cn">5</span>
    cold_start_budget_sec: <span class="cn">90</span>
  <span class="ck">scheduled</span>:
    wake_cron: <span class="cs">"0 8 * * 1-5"</span>     <span class="cc"># Mon-Fri 8am</span>
    hibernate_cron: <span class="cs">"0 18 * * 1-5"</span> <span class="cc"># Mon-Fri 6pm</span>
  <span class="ck">dns_proxy</span>:
    type: <span class="cs">coredns_plugin</span>
    intercept: [<span class="cs">"*.confluent.cloud"</span>, <span class="cs">"*.snowflakecomputing.com"</span>]
    hold_timeout_sec: <span class="cn">90</span>
  <span class="ck">revocation</span>:
    dev: { action: <span class="cs">immediate</span>, auth: <span class="cs">sso_only</span> }
    perf: { action: <span class="cs">immediate</span>, auth: <span class="cs">mfa_step_up</span> }
    prod: { action: <span class="cs">snow_change_request</span>, auth: <span class="cs">mfa_step_up</span>, grace_min: <span class="cn">30</span> }
    emergency: { requires: [<span class="cs">conduit_admin</span>, <span class="cs">mfa</span>, <span class="cs">reason</span>] }</div>
`;
}

      [true,'Approver list per team configured'],
      [true,'SCIM sync enabled from IdP to Conduit'],
      [true,'OAuth app registered for Conduit JWT validation'],

    {title:'Client cloud accounts (infrastructure plane)', color:'#EA580C', owner:'Platform engineering', items:[

      [true,'VPCs/VNets created with non-overlapping CIDRs'],
      [true,'Subnets created in target AZs (min 2 AZs for prod HA)'],

      [true,'Service to cluster to CSP to region mappings for all services'],
      [true,'Cluster naming convention'],
      [true,'Webhook from ArgoCD to Conduit for auto-registration'],

    ]},

      [true,'Conduit catalog item with custom variables'],
      [true,'Assignment groups per team'],
      [true,'CMDB CI class with CSP, account, VPC, region, env, team fields'],
      [true,'CMDB CIs synced from Day 0 config registry'],
      [true,'Business Rule webhook: RITM state change to Conduit callback'],
    ]},
    {title:'Conduit platform (orchestrator)', color:'#7C3AED', owner:'Platform engineering', items:[
