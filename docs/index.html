:root{--bg:#f8f9fb;--surface:#fff;--surface2:#f1f3f5;--border:#e2e8f0;--dark:#0f172a;--muted:#64748b;--accent:#1e40af;--accent-light:#eff6ff;--green:#16a34a;--green-light:#f0fdf4;--amber:#d97706;--amber-light:#fffbeb;--red:#dc2626;--red-light:#fef2f2;--purple:#7c3aed;--purple-light:#f5f3ff;--teal:#0f766e;--teal-light:#f0fdfa;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;--aws:#FF9900;--azure:#0078D4;--gcp:#4285F4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--dark)}
.header{background:var(--dark);padding:20px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{color:#fff;font-size:18px;font-weight:600;letter-spacing:-.3px}
.header .sub{color:#94a3b8;font-size:13px;margin-top:2px}
.header .badge{background:var(--accent);color:#fff;font-size:10px;padding:3px 10px;border-radius:10px;font-weight:600;letter-spacing:.5px}
.nav{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border);overflow-x:auto}
.nav-item{padding:12px 18px;font-size:13px;font-weight:500;cursor:pointer;background:var(--surface2);color:var(--muted);white-space:nowrap;transition:all .15s;border-bottom:2px solid transparent}
.nav-item:hover{background:var(--surface);color:var(--dark)}
.nav-item.active{background:var(--surface);color:var(--accent);border-bottom-color:var(--accent)}
.content{max-width:1100px;margin:0 auto;padding:24px}
.sl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;margin:24px 0 10px}
.sl:first-child{margin-top:0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px}
.card h3{font-size:14px;font-weight:600;margin-bottom:8px}
.mono{font-family:var(--mono)}
.code{font-family:var(--mono);font-size:11px;background:var(--dark);color:#e2e8f0;padding:14px 16px;border-radius:8px;line-height:1.7;overflow-x:auto;white-space:pre;margin:8px 0}
.ck{color:#93c5fd}.cs{color:#86efac}.cn{color:#fcd34d}.cc{color:#64748b}.ce{color:#fca5a5}
.badge-sm{display:inline-block;font-size:9px;font-weight:600;padding:2px 8px;border-radius:10px}
.b-aws{background:var(--aws);color:#fff}.b-azure{background:var(--azure);color:#fff}.b-gcp{background:var(--gcp);color:#fff}
.b-ok{background:var(--green-light);color:var(--green)}.b-warn{background:var(--amber-light);color:var(--amber)}
.b-err{background:var(--red-light);color:var(--red)}.b-info{background:var(--accent-light);color:var(--accent)}
.b-purple{background:var(--purple-light);color:var(--purple)}.b-teal{background:var(--teal-light);color:var(--teal)}
.tbl{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.tbl th{text-align:left;padding:8px 10px;font-weight:600;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--surface2)}
.tbl td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.tbl tr:hover td{background:var(--surface2)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px}
.metric .label{font-size:11px;color:var(--muted)}
.metric .val{font-size:22px;font-weight:600;margin-top:2px}
.metric .sub{font-size:11px;color:var(--muted);margin-top:2px}
.flow-step{display:grid;grid-template-columns:44px 1fr 240px;gap:0;margin-bottom:0}
.flow-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;margin-top:2px}
.flow-line-area{display:flex;flex-direction:column;align-items:center}
.flow-connector{width:2px;flex:1;background:var(--border);margin-top:4px}
.flow-body{padding-bottom:20px}
.flow-title{font-size:13px;font-weight:600;margin-bottom:3px}
.flow-desc{font-size:12px;color:var(--muted);line-height:1.6}
.flow-side{font-size:11px;color:var(--muted);line-height:1.5;padding:4px 12px;border-left:2px solid var(--border);margin-top:2px}
.flow-side strong{color:var(--dark);font-weight:500}
.resolve-chain{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:8px 0}
.resolve-node{padding:5px 10px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid var(--border);background:var(--surface)}
.resolve-arrow{color:var(--muted);font-size:13px}
.alert{border-radius:8px;padding:12px 16px;font-size:12px;line-height:1.6;margin:8px 0}
.alert-ok{background:var(--green-light);border:1px solid #bbf7d0;color:#166534}
.alert-err{background:var(--red-light);border:1px solid #fecaca;color:#991b1b}
.alert-warn{background:var(--amber-light);border:1px solid #fde68a;color:#92400e}
.alert-info{background:var(--accent-light);border:1px solid #bfdbfe;color:#1e3a8a}
.demo-row{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin:12px 0}
.demo-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500}
.demo-field select,.demo-field input{font-family:var(--font);font-size:13px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;background:var(--surface)}
.btn{font-family:var(--font);font-size:12px;font-weight:600;padding:8px 18px;border-radius:6px;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#1e3a8a}
.btn-outline{background:var(--surface);color:var(--dark);border:1px solid var(--border)}.btn-outline:hover{background:var(--surface2)}
.arch-container{position:relative;margin:16px 0}
.cb-row{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.cb-row:last-child{border:none}
.cb-bar-wrap{flex:1;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin:0 12px}
.cb-bar{height:100%;border-radius:4px}
.approval-card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--surface)}
@media(max-width:768px){.flow-step{grid-template-columns:44px 1fr}.flow-side{display:none}.metrics{grid-template-columns:1fr 1fr}}
</style>
</head>

function saasBadge(s){const p=SAAS[s];return p?`<span class="badge-sm" style="background:${p.color};color:#fff">${p.name}</span>`:`<span class="badge-sm">${s}</span>`}
function findDay0(team,env,csp,region){const t=TEAMS.find(x=>x.name===team);if(!t)return null;return t.accounts.find(a=>a.env===env&&a.csp===csp&&a.region===region)||null}

  document.getElementById('content').innerHTML=fn[tab]();
}

<div class="sl">Why this tab</div>
<div class="card">
<p style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:0">Conduit's <em>generic</em> NaaS abstraction works across any SaaS — but Confluent Cloud has the largest connectivity surface of any tenant and the most active product roadmap on it. This tab pins down the deployment patterns Conduit has to support today, the Feb 13, 2026 inflection (PLATT \u2192 PrivateLink Gateway), and the bidirectional edges most networking-PM portals miss.</p>
</div>

<div class="sl">Recent change \u2014 Feb 13, 2026</div>
<div class="alert alert-warn"><strong>PrivateLink Attachment (PLATT) deprecated.</strong> New ingress resource model: <strong>PrivateLink Gateway</strong> + <strong>Access Points</strong>. Gateway is per-CCN (not per-cluster), Access Points fan out to clusters. PLATT-based connections continue to function but are migration targets. <em>Implication for Conduit:</em> the acceptor plugin for Confluent must support both shapes and surface a migration path \u2014 not switch flags.</div>

<div class="sl">Connectivity decision matrix</div>
<table class="tbl">
<tr><th>Option</th><th>Direction</th><th>CIDR coord</th><th>Throughput</th><th>Cost shape</th><th>Cluster types</th><th>When to pick</th></tr>

<li><strong style="color:var(--dark)">PrivateLink is what customers ask for; PNI is what they should end up on at scale.</strong> The PM challenge is the migration path, not the binary choice. Cost-vs-throughput crossover is the recommendation engine.</li>
<li><strong style="color:var(--dark)">Egress is the hidden product.</strong> Inbound PrivateLink is unidirectional, which leaves managed connectors stranded. Egress PL solves it; consolidating it across AWS / Azure / GCP into one abstraction is a real platform problem.</li>

function runResolve(){
  const svc=SERVICES[demoSvc];
  if(!svc){demoResult='<div class="alert alert-err">404 — service not found in registry.</div>';render();return}
  const deps=svc.deps.filter(d=>d.env===demoEnv);
  if(!deps.length){demoResult=`<div class="alert alert-err">404 — <strong>${demoSvc}</strong> has no deployment in <strong>${demoEnv}</strong>. Available: ${[...new Set(svc.deps.map(d=>d.env))].join(', ')}</div>`;render();return}
  const team=TEAMS.find(t=>t.name===svc.team);
  let h=`<div class="sl">Step 1 — SSO identity</div>
<div class="card"><p style="font-size:12px;line-height:1.6">Caller: <strong>${svc.owner}@acme.com</strong> · SSO: <span class="badge-sm b-info">${team.sso}</span> · Team: <strong>${team.name}</strong> · Cost center: <span class="mono">${team.cc}</span> · Approver: ${team.approvers[0]}</p></div>
<div class="sl">Step 2 — service registry: ${demoSvc} in ${demoEnv}</div>
<div class="card">${deps.map(d=>`<div class="resolve-chain">
<div class="resolve-node" style="background:var(--accent-light);color:var(--accent)">${demoSvc}</div><span class="resolve-arrow">→</span>
<div class="resolve-node">${d.cluster}</div><span class="resolve-arrow">→</span>
<div class="resolve-node">${cspBadge(d.csp)} ${d.region}</div><span class="resolve-arrow">→</span>
<div class="resolve-node">${d.ns} (${d.rep} replicas)</div>
</div>`).join('')}</div>
<div class="sl">Step 3 — Day 0 config match</div>`;
  let conns=[];
  deps.forEach(d=>{const cfg=findDay0(svc.team,d.env,d.csp,d.region);
    if(!cfg){h+=`<div class="alert alert-err">422 — No Day 0 config for ${svc.team}/${d.env}/${d.csp}/${d.region}. Platform team must register.</div>`;return}
    const bs=`pkc-${d.env}01.${d.region}.${d.csp}.confluent.cloud:9092`;
    const ep=`${d.csp==='aws'?'vpce':d.csp==='azure'?'pe':'psc'}-${demoSvc.replace('-svc','')}-${d.region.replace(/-/g,'').substring(0,6)}`;
    conns.push({csp:d.csp,region:d.region,bs,ep,vpc:cfg.vpc,iam:cfg.iam,sg:cfg.sg});
    h+=`<div class="card"><div style="font-size:12px;line-height:1.7">
${cspBadge(d.csp)} <strong>${d.region}</strong> · VPC: <span class="mono">${cfg.vpc}</span> (${cfg.cidr}) · Subnets: <span class="mono">${cfg.subnets.join(', ')}</span><br>
IAM: <span class="mono" style="font-size:10px">${cfg.iam}</span> · SG: <span class="mono">${cfg.sg}</span></div></div>`});
  if(conns.length){
    const snow=demoEnv==='prod';
    h+=`<div class="sl">Step 4 — ${snow?'SNOW approval (prod)':'Auto-approved'}</div>
${snow?`<div class="alert alert-warn"><strong>SNOW RITM created</strong> — ${conns.length} location${conns.length>1?'s':''}. Routed to ${team.approvers[0]}. Projected: $${(conns.length*71.40).toFixed(2)}/mo.</div>`:'<div class="alert alert-ok"><strong>Auto-approved</strong> — dev/QA, under threshold.</div>'}
<div class="sl">Step 5 — developer receives</div>
<div class="alert alert-ok"><strong>${conns.length>1?conns.length+' multi-cloud endpoints provisioned':'Endpoint provisioned'}</strong></div>
<div class="code"><span class="cc">// response — paste into code</span>
{
  <span class="cs">"connections"</span>: [${conns.map(c=>`
    { <span class="cs">"bootstrap"</span>: <span class="cs">"${c.bs}"</span>,
      <span class="cs">"endpoint"</span>: <span class="cs">"${c.ep}"</span> }`).join(',')}
  ],
  <span class="cs">"env_vars"</span>: {
    <span class="cs">"KAFKA_BOOTSTRAP_SERVERS"</span>: <span class="cs">"${conns.map(c=>c.bs).join(',')}"</span>,
    <span class="cs">"KAFKA_API_KEY"</span>: <span class="cs">"XXXXXXXX"</span>,
    <span class="cs">"KAFKA_API_SECRET"</span>: <span class="cs">"********"</span>
  }
}</div>`}
  demoResult=h;render();
}

function pgRun(){
  try{const b=JSON.parse(document.getElementById('pg-body').value);
  const svc=SERVICES[b.service],team=svc?TEAMS.find(t=>t.name===svc.team):null;
  if(!svc){document.getElementById('pg-result').innerHTML='<div class="alert alert-err" style="margin-top:8px"><strong>404</strong> — Service "'+b.service+'" not in registry.</div>';return}
  const deps=svc.deps.filter(d=>d.env===b.environment);
  if(!deps.length){document.getElementById('pg-result').innerHTML='<div class="alert alert-err" style="margin-top:8px"><strong>404</strong> — No deployment in "'+b.environment+'". Available: '+[...new Set(svc.deps.map(d=>d.env))].join(', ')+'</div>';return}
  const isProd=b.environment==='prod';
  const conns=deps.map(d=>({csp:d.csp,region:d.region,bootstrap:'pkc-'+b.environment+'01.'+d.region+'.'+d.csp+'.saas.cloud:9092',ip:'10.'+Math.floor(Math.random()*255)+'.1.'+Math.floor(Math.random()*255),ep:(d.csp==='aws'?'vpce':d.csp==='azure'?'pe':'psc')+'-'+b.service.replace('-svc','')+'-'+d.region.substring(0,6)}));
  const resp=isProd?{request_id:'REQ-'+Math.floor(Math.random()*9000+1000),status:'PENDING_APPROVAL',snow_ritm:'RITM004'+Math.floor(Math.random()*9000+1000),approver:team.approvers[0],resolved:{team:team.name,locations:conns.length,projected_monthly:'$'+(conns.length*71.40).toFixed(2)},poll_url:'/api/v1/connections/REQ-.../status'}
  :{connection_id:'conn-'+Math.random().toString(36).substring(2,6),status:'ACTIVE',resolved:{team:team.name,cost_center:team.cc,approval:'auto'},connections:conns.map(c=>({csp:c.csp,region:c.region,bootstrap:c.bootstrap,private_ip:c.ip,endpoint_id:c.ep})),env_vars:{KAFKA_BOOTSTRAP_SERVERS:conns.map(c=>c.bootstrap).join(','),KAFKA_API_KEY:'XXXXXXXXXXXXXXXX',KAFKA_API_SECRET:'********'}};
  document.getElementById('pg-result').innerHTML=`<div style="margin-top:8px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span class="badge-sm" style="background:${isProd?'var(--amber)':'var(--green)'};color:#fff">${isProd?'202 Accepted':'200 OK'}</span><span style="font-size:11px;color:var(--muted)">${Math.floor(Math.random()*200+50)}ms</span></div><div class="code" style="font-size:10px">${JSON.stringify(resp,null,2)}</div></div>`;
  }catch(e){document.getElementById('pg-result').innerHTML='<div class="alert alert-err" style="margin-top:8px">Invalid JSON: '+e.message+'</div>'}
}

            ┌──────────────────────────────────────────────────┐

<div class="card" style="margin-top:10px;border-left:3px solid var(--red);border-radius:0 10px 10px 0">
<h3>Emergency revoke (break-glass)</h3>
<div style="font-size:12px;color:var(--muted);line-height:1.6">Security incidents only. Requires <code>conduit-admin</code> role + MFA + mandatory reason field. Immediate teardown, no grace period. SNOW incident auto-created post-facto for audit trail.</div>
<div class="code" style="font-size:10px">DELETE /api/v1/admin/connections/CONN-001?emergency=true
X-Step-Up: $MFA_TOKEN
X-Reason: "Security incident — credential compromise"</div>
</div>

<div class="sl">Configuration</div>
<div class="code"><span class="cc"># conduit.yaml — lifecycle modes</span>
<span class="ck">lifecycle</span>:
  <span class="ck">defaults</span>:
    prod: <span class="cs">always_on</span>
    perf: <span class="cs">scheduled</span>
    staging: <span class="cs">scheduled</span>
    qa: <span class="cs">serverless</span>
    dev: <span class="cs">serverless</span>
  <span class="ck">serverless</span>:
    wake_on: <span class="cs">dns_query</span>
    idle_timeout_min: <span class="cn">30</span>
    drain_period_min: <span class="cn">5</span>
    cold_start_budget_sec: <span class="cn">90</span>
  <span class="ck">scheduled</span>:
    wake_cron: <span class="cs">"0 8 * * 1-5"</span>     <span class="cc"># Mon-Fri 8am</span>
    hibernate_cron: <span class="cs">"0 18 * * 1-5"</span> <span class="cc"># Mon-Fri 6pm</span>
  <span class="ck">dns_proxy</span>:
    type: <span class="cs">coredns_plugin</span>
    intercept: [<span class="cs">"*.confluent.cloud"</span>, <span class="cs">"*.snowflakecomputing.com"</span>]
    hold_timeout_sec: <span class="cn">90</span>
  <span class="ck">revocation</span>:
    dev: { action: <span class="cs">immediate</span>, auth: <span class="cs">sso_only</span> }
    perf: { action: <span class="cs">immediate</span>, auth: <span class="cs">mfa_step_up</span> }
    prod: { action: <span class="cs">snow_change_request</span>, auth: <span class="cs">mfa_step_up</span>, grace_min: <span class="cn">30</span> }
    emergency: { requires: [<span class="cs">conduit_admin</span>, <span class="cs">mfa</span>, <span class="cs">reason</span>] }</div>
`;
}
